<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quản lý Coupon – Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/frontend/js/api.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="nav"></div>
  <div class="flex">
    <aside class="w-56 bg-gray-900 text-white min-h-screen p-4 shrink-0">
      <h2 class="text-lg font-bold mb-6 text-blue-400">Admin Panel</h2>
      <nav class="space-y-1 text-sm">
        <a href="/frontend/admin/index.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">📊 Dashboard</a>
        <a href="/frontend/admin/products.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">📦 Sản phẩm</a>
        <a href="/frontend/admin/categories.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">📁 Danh mục</a>
        <a href="/frontend/admin/orders.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">🧾 Đơn hàng</a>
        <a href="/frontend/admin/users.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">👥 Người dùng</a>
        <a href="/frontend/admin/coupons.html" class="flex items-center gap-2 px-3 py-2 rounded bg-blue-700">🎫 Coupon</a>
        <a href="/frontend/admin/banners.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">🖼 Banner</a>
      </nav>
    </aside>
    <main class="flex-1 p-6">
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Quản lý Coupon</h1>
        <button onclick="openModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">+ Thêm coupon</button>
      </div>
      <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-gray-600">
            <tr>
              <th class="px-4 py-3 text-left">Mã</th>
              <th class="px-4 py-3 text-center">Giảm (%)</th>
              <th class="px-4 py-3 text-center">Đã dùng / Giới hạn</th>
              <th class="px-4 py-3 text-left">Hiệu lực</th>
              <th class="px-4 py-3 text-center">Trạng thái</th>
              <th class="px-4 py-3 text-center">Thao tác</th>
            </tr>
          </thead>
          <tbody id="couponTable" class="divide-y"></tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6">
      <div class="flex justify-between items-center mb-4">
        <h2 id="modalTitle" class="font-bold text-gray-800 text-lg">Thêm coupon</h2>
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">✕</button>
      </div>
      <div id="formErr" class="hidden bg-red-100 text-red-700 p-3 rounded mb-4 text-sm"></div>
      <form onsubmit="submitCoupon(event)" class="space-y-4">
        <input type="hidden" id="editId">
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Mã coupon *</label>
            <input id="cCode" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Giảm (%) *</label>
            <input id="cDiscount" type="number" min="0.01" max="100" step="0.01" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" required>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Giới hạn dùng</label>
            <input id="cLimit" type="number" min="1" placeholder="Không giới hạn" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Trạng thái</label>
            <select id="cActive" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
              <option value="1">Hoạt động</option>
              <option value="0">Tắt</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Bắt đầu</label>
            <input id="cFrom" type="datetime-local" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Kết thúc</label>
            <input id="cUntil" type="datetime-local" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
          </div>
        </div>
        <div class="flex justify-end gap-3">
          <button type="button" onclick="closeModal()" class="px-4 py-2 border rounded-lg text-gray-600 hover:bg-gray-50">Hủy</button>
          <button type="submit" id="submitBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Lưu</button>
        </div>
      </form>
    </div>
  </div>

<script>
  renderNav();
  if (!Auth.requireAdmin()) {}

  async function load() {
    const res = await GET('/coupon');
    if (!res?.ok) return;
    document.getElementById('couponTable').innerHTML = res.data.map(c => `
      <tr class="hover:bg-gray-50">
        <td class="px-4 py-3 font-bold text-blue-700">${c.code}</td>
        <td class="px-4 py-3 text-center font-semibold">${c.discount_value}%</td>
        <td class="px-4 py-3 text-center text-gray-600">${c.used_count} / ${c.usage_limit ?? '∞'}</td>
        <td class="px-4 py-3 text-gray-500 text-xs">
          ${c.valid_from ? new Date(c.valid_from).toLocaleDateString('vi-VN') : '—'} →
          ${c.valid_until ? new Date(c.valid_until).toLocaleDateString('vi-VN') : '—'}
        </td>
        <td class="px-4 py-3 text-center">
          <span class="px-2 py-1 rounded-full text-xs font-semibold ${c.is_active ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}">
            ${c.is_active ? 'Hoạt động' : 'Tắt'}
          </span>
        </td>
        <td class="px-4 py-3 text-center space-x-2">
          <button onclick="editCoupon(${c.id})" class="text-blue-600 hover:underline text-xs">Sửa</button>
          <button onclick="deleteCoupon(${c.id},'${c.code}')" class="text-red-500 hover:underline text-xs">Xóa</button>
        </td>
      </tr>`).join('');
  }

  function openModal(data = null) {
    document.getElementById('editId').value    = data?.id || '';
    document.getElementById('modalTitle').textContent = data ? 'Sửa coupon' : 'Thêm coupon';
    document.getElementById('cCode').value     = data?.code || '';
    document.getElementById('cDiscount').value = data?.discount_value || '';
    document.getElementById('cLimit').value    = data?.usage_limit || '';
    document.getElementById('cActive').value   = data?.is_active ? '1' : '0';
    document.getElementById('cFrom').value     = data?.valid_from  ? data.valid_from.replace(' ','T').substring(0,16)  : '';
    document.getElementById('cUntil').value    = data?.valid_until ? data.valid_until.replace(' ','T').substring(0,16) : '';
    document.getElementById('formErr').classList.add('hidden');
    document.getElementById('modal').classList.remove('hidden');
  }

  function closeModal() { document.getElementById('modal').classList.add('hidden'); }

  async function editCoupon(id) {
    const res = await GET('/coupon/' + id);
    if (res?.ok) openModal(res.data);
  }

  async function submitCoupon(e) {
    e.preventDefault();
    const id  = document.getElementById('editId').value;
    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = 'Đang lưu...';
    const body = {
      code:           document.getElementById('cCode').value.trim(),
      discount_value: parseFloat(document.getElementById('cDiscount').value),
      usage_limit:    document.getElementById('cLimit').value ? parseInt(document.getElementById('cLimit').value) : null,
      is_active:      document.getElementById('cActive').value === '1',
      valid_from:     document.getElementById('cFrom').value  || null,
      valid_until:    document.getElementById('cUntil').value || null,
    };
    const res = id ? await PUT('/coupon/'+id, body) : await POST('/coupon', body);
    if (!res?.ok) {
      showError(document.getElementById('formErr'), (res?.data?.errors||[res?.data?.error||'Lỗi']).join(', '));
      btn.disabled = false; btn.textContent = 'Lưu'; return;
    }
    showToast(id ? 'Cập nhật thành công' : 'Thêm coupon thành công');
    closeModal(); load();
    btn.disabled = false; btn.textContent = 'Lưu';
  }

  async function deleteCoupon(id, code) {
    if (!confirm(`Xóa coupon "${code}"?`)) return;
    const res = await DELETE('/coupon/' + id);
    if (res?.ok) { showToast('Đã xóa coupon'); load(); }
    else showToast(res?.data?.error || 'Lỗi', 'error');
  }

  load();
</script>
</body>
</html>
