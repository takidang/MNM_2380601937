<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard – TECH-SPECTRUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/frontend/js/api.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="nav"></div>
  <div class="flex">
    <!-- Sidebar -->
    <aside class="w-56 bg-gray-900 text-white min-h-screen p-4 shrink-0">
      <h2 class="text-lg font-bold mb-6 text-blue-400">Admin Panel</h2>
      <nav class="space-y-1 text-sm">
        <a href="/frontend/admin/index.html" class="flex items-center gap-2 px-3 py-2 rounded bg-blue-700">📊 Dashboard</a>
        <a href="/frontend/admin/products.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">📦 Sản phẩm</a>
        <a href="/frontend/admin/categories.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">📁 Danh mục</a>
        <a href="/frontend/admin/orders.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">🧾 Đơn hàng</a>
        <a href="/frontend/admin/users.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">👥 Người dùng</a>
        <a href="/frontend/admin/coupons.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">🎫 Coupon</a>
        <a href="/frontend/admin/banners.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">🖼 Banner</a>
      </nav>
    </aside>
    <!-- Main -->
    <main class="flex-1 p-6">
      <h1 class="text-2xl font-bold text-gray-800 mb-6">Dashboard</h1>
      <div id="stats" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </main>
  </div>

<script>
  renderNav();
  if (!Auth.requireAdmin()) {}

  async function load() {
    const [products, categories, orders, users] = await Promise.all([
      GET('/product?per_page=1'),
      GET('/category'),
      GET('/order'),
      GET('/user'),
    ]);

    const cards = [
      { label: 'Sản phẩm', value: products?.data?.pagination?.total ?? '—', color: 'bg-blue-500', icon: '📦' },
      { label: 'Danh mục', value: categories?.data?.length ?? '—', color: 'bg-purple-500', icon: '📁' },
      { label: 'Đơn hàng', value: orders?.data?.length ?? '—', color: 'bg-yellow-500', icon: '🧾' },
      { label: 'Người dùng', value: users?.data?.length ?? '—', color: 'bg-green-500', icon: '👥' },
    ];

    document.getElementById('stats').innerHTML = cards.map(c => `
      <div class="${c.color} text-white rounded-xl shadow p-6 flex items-center gap-4">
        <span class="text-4xl">${c.icon}</span>
        <div>
          <p class="text-3xl font-bold">${c.value}</p>
          <p class="text-sm opacity-80">${c.label}</p>
        </div>
      </div>`).join('');
  }

  load();
</script>
</body>
</html>
