<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quản lý đơn hàng – Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/frontend/js/api.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="nav"></div>
  <div class="flex">
    <aside class="w-56 bg-gray-900 text-white min-h-screen p-4 shrink-0">
      <h2 class="text-lg font-bold mb-6 text-blue-400">Admin Panel</h2>
      <nav class="space-y-1 text-sm">
        <a href="/frontend/admin/index.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">📊 Dashboard</a>
        <a href="/frontend/admin/products.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">📦 Sản phẩm</a>
        <a href="/frontend/admin/categories.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">📁 Danh mục</a>
        <a href="/frontend/admin/orders.html" class="flex items-center gap-2 px-3 py-2 rounded bg-blue-700">🧾 Đơn hàng</a>
        <a href="/frontend/admin/users.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">👥 Người dùng</a>
        <a href="/frontend/admin/coupons.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">🎫 Coupon</a>
        <a href="/frontend/admin/banners.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">🖼 Banner</a>
      </nav>
    </aside>
    <main class="flex-1 p-6">
      <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Quản lý đơn hàng</h1>
        <select id="statusFilter" onchange="load()" class="border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="">Tất cả trạng thái</option>
          <option value="pending">Chờ xử lý</option>
          <option value="confirmed">Đã xác nhận</option>
          <option value="shipping">Đang giao</option>
          <option value="completed">Hoàn thành</option>
          <option value="cancelled">Đã hủy</option>
        </select>
      </div>
      <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-gray-600">
            <tr>
              <th class="px-4 py-3 text-left">Mã đơn</th>
              <th class="px-4 py-3 text-left">Khách hàng</th>
              <th class="px-4 py-3 text-left">Ngày đặt</th>
              <th class="px-4 py-3 text-right">Tổng tiền</th>
              <th class="px-4 py-3 text-center">Trạng thái</th>
              <th class="px-4 py-3 text-center">Thao tác</th>
            </tr>
          </thead>
          <tbody id="orderTable" class="divide-y"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Modal cập nhật trạng thái -->
  <div id="modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-6">
      <h2 class="font-bold text-gray-800 text-lg mb-4">Cập nhật trạng thái đơn #<span id="modalOrderId"></span></h2>
      <select id="newStatus" class="w-full border rounded-lg px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-400">
        <option value="pending">Chờ xử lý</option>
        <option value="confirmed">Đã xác nhận</option>
        <option value="shipping">Đang giao</option>
        <option value="completed">Hoàn thành</option>
        <option value="cancelled">Đã hủy</option>
      </select>
      <div class="flex justify-end gap-3">
        <button onclick="closeModal()" class="px-4 py-2 border rounded-lg text-gray-600 hover:bg-gray-50">Hủy</button>
        <button onclick="updateStatus()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Cập nhật</button>
      </div>
    </div>
  </div>

<script>
  renderNav();
  if (!Auth.requireAdmin()) {}

  const statusLabel = { pending:'Chờ xử lý', confirmed:'Đã xác nhận', shipping:'Đang giao', completed:'Hoàn thành', cancelled:'Đã hủy' };
  const statusColor = { pending:'bg-gray-100 text-gray-700', confirmed:'bg-blue-100 text-blue-700',
                        shipping:'bg-yellow-100 text-yellow-700', completed:'bg-green-100 text-green-700',
                        cancelled:'bg-red-100 text-red-700' };
  let editingOrderId = null;

  async function load() {
    const status = document.getElementById('statusFilter').value;
    const res = await GET('/order' + (status ? '?status='+status : ''));
    if (!res?.ok) return;
    document.getElementById('orderTable').innerHTML = res.data.map(o => `
      <tr class="hover:bg-gray-50">
        <td class="px-4 py-3 font-semibold">#${o.id}</td>
        <td class="px-4 py-3">
          <p class="font-medium">${o.customer_name}</p>
          <p class="text-gray-400 text-xs">${o.customer_phone}</p>
        </td>
        <td class="px-4 py-3 text-gray-500">${new Date(o.created_at).toLocaleDateString('vi-VN')}</td>
        <td class="px-4 py-3 text-right font-bold text-blue-600">${formatVND(o.total_amount)}</td>
        <td class="px-4 py-3 text-center">
          <span class="px-2 py-1 rounded-full text-xs font-semibold ${statusColor[o.status]||'bg-gray-100'}">
            ${statusLabel[o.status]||o.status}
          </span>
        </td>
        <td class="px-4 py-3 text-center">
          <button onclick="openStatusModal(${o.id},'${o.status}')" class="text-blue-600 hover:underline text-xs">Cập nhật</button>
        </td>
      </tr>`).join('');
  }

  function openStatusModal(orderId, currentStatus) {
    editingOrderId = orderId;
    document.getElementById('modalOrderId').textContent = orderId;
    document.getElementById('newStatus').value = currentStatus;
    document.getElementById('modal').classList.remove('hidden');
  }

  function closeModal() { document.getElementById('modal').classList.add('hidden'); }

  async function updateStatus() {
    const status = document.getElementById('newStatus').value;
    const res = await PUT('/order/' + editingOrderId, { status });
    if (res?.ok) { showToast('Cập nhật thành công'); closeModal(); load(); }
    else showToast(res?.data?.error || 'Lỗi', 'error');
  }

  load();
</script>
</body>
</html>
