<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quản lý người dùng – Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/frontend/js/api.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="nav"></div>
  <div class="flex">
    <aside class="w-56 bg-gray-900 text-white min-h-screen p-4 shrink-0">
      <h2 class="text-lg font-bold mb-6 text-blue-400">Admin Panel</h2>
      <nav class="space-y-1 text-sm">
        <a href="/frontend/admin/index.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">📊 Dashboard</a>
        <a href="/frontend/admin/products.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">📦 Sản phẩm</a>
        <a href="/frontend/admin/categories.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">📁 Danh mục</a>
        <a href="/frontend/admin/orders.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">🧾 Đơn hàng</a>
        <a href="/frontend/admin/users.html" class="flex items-center gap-2 px-3 py-2 rounded bg-blue-700">👥 Người dùng</a>
        <a href="/frontend/admin/coupons.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">🎫 Coupon</a>
        <a href="/frontend/admin/banners.html" class="flex items-center gap-2 px-3 py-2 rounded hover:bg-gray-700">🖼 Banner</a>
      </nav>
    </aside>
    <main class="flex-1 p-6">
      <h1 class="text-2xl font-bold text-gray-800 mb-6">Quản lý người dùng</h1>
      <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-gray-600">
            <tr>
              <th class="px-4 py-3 text-left">ID</th>
              <th class="px-4 py-3 text-left">Tên đăng nhập</th>
              <th class="px-4 py-3 text-left">Họ tên</th>
              <th class="px-4 py-3 text-left">Email</th>
              <th class="px-4 py-3 text-center">Vai trò</th>
              <th class="px-4 py-3 text-center">Trạng thái</th>
              <th class="px-4 py-3 text-center">Thao tác</th>
            </tr>
          </thead>
          <tbody id="userTable" class="divide-y"></tbody>
        </table>
      </div>
    </main>
  </div>

<script>
  renderNav();
  if (!Auth.requireAdmin()) {}
  const me = Auth.getUser();

  async function load() {
    const res = await GET('/user');
    if (!res?.ok) return;
    document.getElementById('userTable').innerHTML = res.data.map(u => `
      <tr class="hover:bg-gray-50">
        <td class="px-4 py-3 text-gray-500">#${u.id}</td>
        <td class="px-4 py-3 font-medium">${u.username}</td>
        <td class="px-4 py-3">${u.fullname || '—'}</td>
        <td class="px-4 py-3 text-gray-500">${u.email || '—'}</td>
        <td class="px-4 py-3 text-center">
          <span class="px-2 py-1 rounded-full text-xs font-semibold ${u.role === 'admin' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}">
            ${u.role}
          </span>
        </td>
        <td class="px-4 py-3 text-center">
          <span class="px-2 py-1 rounded-full text-xs font-semibold ${u.status === 'active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
            ${u.status === 'active' ? 'Hoạt động' : 'Bị khóa'}
          </span>
        </td>
        <td class="px-4 py-3 text-center space-x-2">
          ${u.id !== me?.id ? `
            <button onclick="toggleStatus(${u.id},'${u.status}')" class="text-yellow-600 hover:underline text-xs">
              ${u.status === 'active' ? 'Khóa' : 'Mở khóa'}
            </button>
            <button onclick="toggleRole(${u.id},'${u.role}')" class="text-blue-600 hover:underline text-xs">
              ${u.role === 'admin' ? 'Hạ xuống User' : 'Thăng Admin'}
            </button>
            <button onclick="deleteUser(${u.id},'${u.username}')" class="text-red-500 hover:underline text-xs">Xóa</button>
          ` : '<span class="text-gray-400 text-xs">Tài khoản của bạn</span>'}
        </td>
      </tr>`).join('');
  }

  async function toggleStatus(id, current) {
    const newStatus = current === 'active' ? 'locked' : 'active';
    const res = await PUT('/user/'+id, { status: newStatus });
    if (res?.ok) { showToast('Cập nhật thành công'); load(); }
    else showToast(res?.data?.error || 'Lỗi', 'error');
  }

  async function toggleRole(id, current) {
    const newRole = current === 'admin' ? 'user' : 'admin';
    if (!confirm(`Chuyển role thành ${newRole}?`)) return;
    const res = await PUT('/user/'+id, { role: newRole });
    if (res?.ok) { showToast('Cập nhật role thành công'); load(); }
    else showToast(res?.data?.error || 'Lỗi', 'error');
  }

  async function deleteUser(id, username) {
    if (!confirm(`Xóa người dùng "${username}"? Hành động này không thể hoàn tác.`)) return;
    const res = await DELETE('/user/'+id);
    if (res?.ok) { showToast('Đã xóa người dùng'); load(); }
    else showToast(res?.data?.error || 'Lỗi', 'error');
  }

  load();
</script>
</body>
</html>
