<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đặt hàng – TECH-SPECTRUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/frontend/js/api.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="nav"></div>
  <div class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Đặt hàng</h1>
    <div id="content" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <p class="text-gray-500">Đang tải...</p>
    </div>
  </div>

<script>
  renderNav();
  if (!Auth.requireLogin()) {}

  const user = Auth.getUser();
  let cartData = null;

  async function load() {
    const res = await GET('/cart');
    if (!res?.ok || !res.data.items?.length) {
      document.getElementById('content').innerHTML = `<div class="col-span-2 text-center py-10 text-gray-500">
        Giỏ hàng trống. <a href="/frontend/index.html" class="text-blue-600 hover:underline">Mua sắm ngay</a></div>`;
      return;
    }
    cartData = res.data;

    document.getElementById('content').innerHTML = `
      <!-- Form thông tin -->
      <div class="bg-white rounded-xl shadow p-6">
        <h2 class="font-bold text-gray-800 mb-4">Thông tin giao hàng</h2>
        <div id="err" class="hidden bg-red-100 text-red-700 p-3 rounded mb-4 text-sm"></div>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Họ tên</label>
            <input id="name" type="text" value="${user?.fullname || ''}" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Số điện thoại</label>
            <input id="phone" type="text" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input id="email" type="email" value="${user?.email || ''}" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Địa chỉ giao hàng</label>
            <textarea id="address" rows="2" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Ghi chú</label>
            <textarea id="note" rows="2" placeholder="Ghi chú thêm (tuỳ chọn)" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
          </div>
        </div>
      </div>

      <!-- Tóm tắt đơn hàng -->
      <div>
        <div class="bg-white rounded-xl shadow p-6 mb-4">
          <h2 class="font-bold text-gray-800 mb-3">Đơn hàng của bạn</h2>
          ${cartData.items.map(item => `
            <div class="flex justify-between text-sm py-2 border-b last:border-0">
              <span class="text-gray-700">${item.name} ${item.variant_name ? '('+item.variant_name+')' : ''} x${item.quantity}</span>
              <span class="font-semibold">${formatVND(item.line_total)}</span>
            </div>`).join('')}
          <div class="mt-3 space-y-1 text-sm">
            <div class="flex justify-between text-gray-600"><span>Tạm tính</span><span>${formatVND(cartData.subtotal)}</span></div>
            ${cartData.coupon_code ? `<div class="flex justify-between text-green-600"><span>Giảm giá (${cartData.coupon_code})</span><span>-${formatVND(cartData.discount)}</span></div>` : ''}
            <div class="flex justify-between font-bold text-base pt-2 border-t"><span>Tổng cộng</span><span class="text-blue-600">${formatVND(cartData.total)}</span></div>
          </div>
        </div>
        <button onclick="placeOrder()" id="orderBtn"
          class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-lg hover:bg-blue-700">
          Đặt hàng ngay
        </button>
      </div>`;
  }

  async function placeOrder() {
    const btn = document.getElementById('orderBtn');
    btn.disabled = true; btn.textContent = 'Đang xử lý...';
    const errEl = document.getElementById('err');
    errEl.classList.add('hidden');

    const res = await POST('/order', {
      customer_name:    document.getElementById('name').value.trim(),
      customer_phone:   document.getElementById('phone').value.trim(),
      customer_email:   document.getElementById('email').value.trim(),
      customer_address: document.getElementById('address').value.trim(),
      note:             document.getElementById('note').value.trim(),
    });

    if (!res?.ok) {
      const errors = res?.data?.errors || [res?.data?.error || 'Lỗi đặt hàng'];
      showError(errEl, errors.join(', '));
      btn.disabled = false; btn.textContent = 'Đặt hàng ngay';
      return;
    }

    window.location.href = `/frontend/order-success.html?id=${res.data.order_id}`;
  }

  load();
</script>
</body>
</html>
