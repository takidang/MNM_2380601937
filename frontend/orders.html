<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đơn hàng của tôi – TECH-SPECTRUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/frontend/js/api.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="nav"></div>
  <div class="max-w-4xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Đơn hàng của tôi</h1>
    <div id="orderList"></div>
    <!-- Modal chi tiết -->
    <div id="modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
      <div class="bg-white rounded-xl shadow-xl max-w-lg w-full max-h-[80vh] overflow-y-auto p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-bold text-gray-800">Chi tiết đơn hàng</h2>
          <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">✕</button>
        </div>
        <div id="modalContent"></div>
      </div>
    </div>
  </div>

<script>
  renderNav();
  if (!Auth.requireLogin()) {}

  const statusLabel = { pending:'Chờ xử lý', confirmed:'Đã xác nhận', shipping:'Đang giao', completed:'Hoàn thành', cancelled:'Đã hủy' };
  const statusColor = { pending:'bg-gray-100 text-gray-700', confirmed:'bg-blue-100 text-blue-700',
                        shipping:'bg-yellow-100 text-yellow-700', completed:'bg-green-100 text-green-700',
                        cancelled:'bg-red-100 text-red-700' };

  async function load() {
    const res = await GET('/order');
    if (!res?.ok) return;
    const orders = res.data;
    const el = document.getElementById('orderList');

    if (!orders.length) {
      el.innerHTML = '<div class="text-center text-gray-500 py-10">Bạn chưa có đơn hàng nào. <a href="/frontend/index.html" class="text-blue-600 hover:underline">Mua sắm ngay</a></div>';
      return;
    }

    el.innerHTML = `
      <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-gray-600">
            <tr>
              <th class="px-4 py-3 text-left">Mã đơn</th>
              <th class="px-4 py-3 text-left">Ngày đặt</th>
              <th class="px-4 py-3 text-right">Tổng tiền</th>
              <th class="px-4 py-3 text-center">Trạng thái</th>
              <th class="px-4 py-3 text-center">Thao tác</th>
            </tr>
          </thead>
          <tbody class="divide-y">
            ${orders.map(o => `
              <tr class="hover:bg-gray-50">
                <td class="px-4 py-3 font-semibold">#${o.id}</td>
                <td class="px-4 py-3 text-gray-500">${new Date(o.created_at).toLocaleDateString('vi-VN')}</td>
                <td class="px-4 py-3 text-right font-bold text-blue-600">${formatVND(o.total_amount)}</td>
                <td class="px-4 py-3 text-center">
                  <span class="px-2 py-1 rounded-full text-xs font-semibold ${statusColor[o.status] || 'bg-gray-100'}">
                    ${statusLabel[o.status] || o.status}
                  </span>
                </td>
                <td class="px-4 py-3 text-center">
                  <button onclick="viewDetail(${o.id})" class="text-blue-600 hover:underline text-xs">Chi tiết</button>
                  ${o.status === 'pending' ? `<button onclick="cancelOrder(${o.id})" class="text-red-500 hover:underline text-xs ml-2">Hủy</button>` : ''}
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  }

  async function viewDetail(orderId) {
    const res = await GET('/order/' + orderId);
    if (!res?.ok) return;
    const o = res.data;
    document.getElementById('modalContent').innerHTML = `
      <div class="space-y-2 text-sm text-gray-700">
        <p><strong>Người nhận:</strong> ${o.customer_name}</p>
        <p><strong>Điện thoại:</strong> ${o.customer_phone}</p>
        <p><strong>Email:</strong> ${o.customer_email}</p>
        <p><strong>Địa chỉ:</strong> ${o.customer_address}</p>
        ${o.note ? `<p><strong>Ghi chú:</strong> ${o.note}</p>` : ''}
      </div>
      <div class="mt-4 border-t pt-4">
        <h3 class="font-semibold mb-2">Sản phẩm</h3>
        ${(o.items||[]).map(i => `
          <div class="flex justify-between text-sm py-1 border-b last:border-0">
            <span>${i.product_name} ${i.variant_name ? '('+i.variant_name+')' : ''} x${i.quantity}</span>
            <span class="font-semibold">${formatVND(i.subtotal)}</span>
          </div>`).join('')}
        ${o.coupon_code ? `<p class="text-green-600 text-sm mt-2">Mã giảm: ${o.coupon_code} (−${formatVND(o.discount_amount)})</p>` : ''}
        <p class="font-bold text-base mt-2">Tổng: <span class="text-blue-600">${formatVND(o.total_amount)}</span></p>
      </div>`;
    document.getElementById('modal').classList.remove('hidden');
  }

  async function cancelOrder(orderId) {
    if (!confirm('Hủy đơn hàng #' + orderId + '?')) return;
    const res = await POST('/order/cancel', { order_id: orderId });
    if (res?.ok) { showToast('Đã hủy đơn hàng'); load(); }
    else showToast(res?.data?.error || 'Lỗi', 'error');
  }

  function closeModal() { document.getElementById('modal').classList.add('hidden'); }

  load();
</script>
</body>
</html>
