<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chi tiết sản phẩm – TECH-SPECTRUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/frontend/js/api.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div id="nav"></div>
  <div class="max-w-5xl mx-auto px-4 py-8" id="content">
    <p class="text-gray-500">Đang tải...</p>
  </div>

<script>
  renderNav();
  const id = new URLSearchParams(location.search).get('id');
  if (!id) window.location.href = '/frontend/index.html';

  let selectedVariant = null;
  let basePrice = 0;

  async function load() {
    const res = await GET('/product/' + id);
    if (!res?.ok) { document.getElementById('content').innerHTML = '<p class="text-red-500">Không tìm thấy sản phẩm.</p>'; return; }
    const p = res.data;
    basePrice = p.price;

    const allImages = [p.image, ...(p.images || []).map(i => i.filename)].filter(Boolean);
    const galleryHtml = allImages.length > 1
      ? allImages.map((fn, i) => `<img src="${imgUrl(fn)}" onclick="switchImg('${imgUrl(fn)}')"
           class="w-16 h-16 object-cover rounded cursor-pointer border-2 ${i===0 ? 'border-blue-500' : 'border-transparent'} hover:border-blue-400"
           onerror="this.style.display='none'">`).join('')
      : '';

    const variantsHtml = p.variants && p.variants.length
      ? `<div class="mt-4">
           <p class="font-semibold text-gray-700 mb-2">Chọn biến thể:</p>
           <div class="flex flex-wrap gap-2" id="variantBtns">
             ${p.variants.map(v => `
               <button onclick="selectVariant(${v.id}, '${v.name}', ${v.price})"
                 id="vbtn-${v.id}"
                 class="px-4 py-2 border rounded-lg text-sm hover:border-blue-500 hover:bg-blue-50">
                 ${v.name} – ${formatVND(v.price)}
               </button>`).join('')}
           </div>
         </div>`
      : '';

    document.getElementById('content').innerHTML = `
      <a href="/frontend/index.html" class="text-blue-600 text-sm hover:underline">← Quay lại</a>
      <div class="mt-4 grid grid-cols-1 md:grid-cols-2 gap-8 bg-white rounded-xl shadow p-6">
        <div>
          <img id="mainImg" src="${imgUrl(p.image)}" alt="${p.name}"
               class="w-full aspect-square object-cover rounded-lg" onerror="this.src='/public/images/no-image.png'">
          <div class="flex gap-2 mt-3 overflow-x-auto">${galleryHtml}</div>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-gray-800">${p.name}</h1>
          <p class="text-sm text-gray-400 mt-1">${p.category_name || ''}</p>
          <p id="priceDisplay" class="text-3xl font-bold text-blue-600 mt-3">${formatVND(p.price)}</p>
          <p class="text-gray-600 mt-4 text-sm leading-relaxed">${p.description || ''}</p>
          ${variantsHtml}
          <div class="mt-6 flex gap-3 items-center">
            <input id="qty" type="number" value="1" min="1" class="border rounded-lg px-3 py-2 w-20 text-center">
            <button onclick="addToCart(${p.id})"
              class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 font-semibold">
              🛒 Thêm vào giỏ hàng
            </button>
          </div>
          <div id="cartMsg" class="hidden mt-3 text-sm"></div>
        </div>
      </div>`;
  }

  function switchImg(src) {
    document.getElementById('mainImg').src = src;
  }

  function selectVariant(variantId, name, price) {
    selectedVariant = { id: variantId, name, price };
    document.getElementById('priceDisplay').textContent = formatVND(price);
    document.querySelectorAll('[id^="vbtn-"]').forEach(b => {
      b.className = 'px-4 py-2 border rounded-lg text-sm hover:border-blue-500 hover:bg-blue-50';
    });
    const btn = document.getElementById('vbtn-' + variantId);
    if (btn) btn.className = 'px-4 py-2 border-2 border-blue-500 bg-blue-50 rounded-lg text-sm font-semibold';
  }

  async function addToCart(productId) {
    if (!Auth.requireLogin()) return;
    const qty = parseInt(document.getElementById('qty').value) || 1;
    const body = { product_id: productId, quantity: qty };
    if (selectedVariant) body.variant_id = selectedVariant.id;

    const res = await POST('/cart', body);
    const msgEl = document.getElementById('cartMsg');
    if (res?.ok) {
      msgEl.className = 'mt-3 text-sm text-green-600';
      msgEl.textContent = '✓ Đã thêm vào giỏ hàng!';
    } else {
      msgEl.className = 'mt-3 text-sm text-red-600';
      msgEl.textContent = res?.data?.error || 'Lỗi thêm giỏ hàng';
    }
    msgEl.classList.remove('hidden');
  }

  load();
</script>
</body>
</html>
