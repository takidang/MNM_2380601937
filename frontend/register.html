<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đăng ký – TECH-SPECTRUM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/frontend/js/api.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
<div class="bg-white p-8 rounded-xl shadow w-full max-w-md">
  <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">Đăng ký tài khoản</h1>
  <div id="err" class="hidden bg-red-100 text-red-700 p-3 rounded mb-4 text-sm"></div>
  <form id="regForm" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Tên đăng nhập</label>
      <input id="username" type="text" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Họ và tên</label>
      <input id="fullname" type="text" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input id="email" type="email" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" required>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
      <input id="password" type="password" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ít nhất 6 ký tự" required>
    </div>
    <button type="submit" id="btn" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 font-semibold">
      Đăng ký
    </button>
  </form>
  <p class="text-center text-sm text-gray-500 mt-4">
    Đã có tài khoản? <a href="/frontend/login.html" class="text-blue-600 hover:underline">Đăng nhập</a>
  </p>
</div>
<script>
  if (Auth.isLoggedIn()) window.location.href = '/frontend/index.html';

  document.getElementById('regForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    btn.disabled = true; btn.textContent = 'Đang đăng ký...';
    const errEl = document.getElementById('err');
    errEl.classList.add('hidden');

    const res = await POST('/auth/register', {
      username: document.getElementById('username').value.trim(),
      fullname: document.getElementById('fullname').value.trim(),
      email:    document.getElementById('email').value.trim(),
      password: document.getElementById('password').value,
    });

    if (!res || !res.ok) {
      const errors = res?.data?.errors || [res?.data?.error || 'Đăng ký thất bại'];
      showError(errEl, errors.join(', '));
      btn.disabled = false; btn.textContent = 'Đăng ký';
      return;
    }

    Auth.setToken(res.data.token);
    Auth.setUser(res.data.user);
    showToast('Đăng ký thành công!');
    setTimeout(() => window.location.href = '/frontend/index.html', 800);
  });
</script>
</body>
</html>
